<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>⚡ 래더 생성기 (Codex 식)</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#c9d1d9;
          --muted:#8b949e; --accent:#58a6ff; --ok:#3fb950; --err:#f85149; --amber:#d29922; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;
         background:var(--bg); color:var(--fg); height:100vh; display:flex; flex-direction:column; }
  header { padding:10px 16px; border-bottom:1px solid var(--border); display:flex;
           gap:12px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; }
  header .sp { flex:1; }
  header a { color:var(--accent); text-decoration:none; font-size:13px; }
  select, button, input, textarea { font:inherit; background:var(--panel);
    color:var(--fg); border:1px solid var(--border); border-radius:6px; padding:6px 10px; }
  button { cursor:pointer; }
  button.primary { background:var(--accent); color:#08111f; border:none; font-weight:600; }
  button:disabled { opacity:.5; cursor:default; }
  .shell { flex:1; display:grid; grid-template-columns:300px 1fr 260px; min-height:0; }
  @media (max-width:820px){ .shell{ grid-template-columns:1fr; grid-template-rows:auto 1fr auto; } }
  .rail { border-right:1px solid var(--border); overflow:auto; padding:10px; }
  .rail.ws { border-right:none; border-left:1px solid var(--border); }
  .center { overflow:auto; padding:12px; min-height:0; display:flex; flex-direction:column; gap:10px; }
  h2 { font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0 0 8px; }
  .tabs { display:flex; gap:4px; }
  .tabs button { padding:4px 10px; font-size:12px; }
  .tabs button.active { background:var(--accent); color:#08111f; border-color:var(--accent); }
  .ev { padding:3px 6px; border-radius:4px; margin-bottom:2px; white-space:pre-wrap; }
  .ev.done { color:var(--ok); } .ev.error { color:var(--err); } .ev.skip { color:var(--muted); }
  .ev.write { color:var(--accent); }
  .errbar { background:#3a1416; color:var(--err); border:1px solid var(--err);
            border-radius:6px; padding:8px 10px; display:none; }
  ul.tree { list-style:none; margin:0; padding:0; }
  ul.tree li { padding:4px 6px; border-radius:4px; cursor:pointer; display:flex; gap:6px; }
  ul.tree li:hover, ul.tree li:focus { background:#1f2630; outline:none; }
  ul.tree li.active { background:#243042; }
  ul.tree li .chip { margin-left:auto; font-size:11px; color:var(--ok); }
  #view-wrap { flex:1; background:var(--panel); border:1px solid var(--border);
               border-radius:8px; overflow:auto; min-height:200px; }
  pre#view { margin:0; padding:12px; white-space:pre; }
  #ladder { padding:12px; }
  .promptbar { border-top:1px solid var(--border); padding:10px 16px; display:flex; gap:8px; }
  .promptbar textarea { flex:1; resize:none; height:50px; }
  .modes { display:flex; gap:10px; align-items:center; }
  .verdict { font-size:12px; padding:2px 8px; border-radius:10px; }
  .verdict.ok { background:#10311c; color:var(--ok); } .verdict.fail { background:#3a1416; color:var(--err); }
  .safety { color:var(--amber); font-size:12px; border:1px solid var(--amber);
            border-radius:6px; padding:6px 8px; }
  .ws-head { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
  .ws-head button { font-size:11px; padding:3px 8px; }
</style>
</head>
<body>
<header>
  <h1>⚡ 래더 생성기</h1>
  <span class="modes">
    <label><input type="radio" name="mode" value="st" checked /> ST</label>
    <label><input type="radio" name="mode" value="nl" /> 자연어(LLM)</label>
  </span>
  <select id="vendors" multiple size="2" title="Ctrl/Cmd 로 다중 선택" aria-label="벤더 선택">
    <option value="LS_XGK" selected>LS_XGK</option>
    <option value="MITSUBISHI_FX" selected>MITSUBISHI_FX</option>
    <option value="SIEMENS_S7">SIEMENS_S7</option>
    <option value="OMRON_CJ">OMRON_CJ</option>
  </select>
  <span class="sp"></span>
  <span id="verdict"></span>
  <a href="/index.html">← 라이브 에디터</a>
</header>

<div class="shell">
  <aside class="rail">
    <h2>생성 과정</h2>
    <div id="timeline" aria-live="polite"><div class="ev skip">입력 후 [생성]을 누르면 단계가 실시간 표시됩니다.</div></div>
  </aside>

  <main class="center">
    <div class="errbar" id="errbar"></div>
    <div class="tabs" id="tabs">
      <button data-tab="ladder" class="active">래더</button>
      <button data-tab="explain">설명</button>
      <button data-tab="view">파일</button>
    </div>
    <div id="view-wrap">
      <div id="ladder"><div class="empty" style="color:var(--muted)">생성하면 래더가 여기 그려집니다.</div></div>
      <pre id="explain" hidden style="white-space:pre-wrap">생성하면 평문 설명이 여기 표시됩니다.</pre>
      <pre id="view" hidden>파일을 선택하면 내용이 여기 표시됩니다.</pre>
    </div>
    <div class="safety" id="safety" hidden></div>
  </main>

  <aside class="rail ws">
    <div class="ws-head"><h2 style="margin:0">워크스페이스</h2><span class="sp" style="flex:1"></span>
      <button id="zip" disabled>ZIP</button></div>
    <ul class="tree" id="tree"></ul>
  </aside>
</div>

<div class="promptbar">
  <textarea id="input" spellcheck="false">MOTOR := (START OR MOTOR) AND NOT STOP;</textarea>
  <button class="primary" id="go">생성 ▶</button>
</div>

<script src="/ladder-render.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const timeline = $("timeline"), tree = $("tree"), view = $("view"), ladderEl = $("ladder");
let project = null, lastLadder = null;

const MARK = { start:"▶", ok:"✓", error:"✗", skip:"·" };

function showError(msg) { const b = $("errbar"); b.style.display = "block"; b.textContent = "⚠ " + msg; }
function clearError() { $("errbar").style.display = "none"; }

function logEvent(ev) {
  const div = document.createElement("div");
  const kind = ev.stage === "done" ? ev.status : (ev.status === "ok" && ev.file ? "write" : ev.status);
  div.className = "ev " + kind;
  let line = `${MARK[ev.status] || " "} ${ev.stage}`;
  if (ev.detail && ev.detail.vendor) line += `  [${ev.detail.vendor}]`;
  if (ev.file) line += `  ${ev.file}`;
  if (ev.message) line += `  — ${ev.message}`;
  div.textContent = line;
  timeline.appendChild(div);
  timeline.scrollTop = timeline.scrollHeight;
}

function setTab(name) {
  document.querySelectorAll("#tabs button").forEach(b => b.classList.toggle("active", b.dataset.tab === name));
  ladderEl.hidden = name !== "ladder";
  $("explain").hidden = name !== "explain";
  view.hidden = name !== "view";
}
document.querySelectorAll("#tabs button").forEach(b => b.onclick = () => setTab(b.dataset.tab));

function renderTree(manifest) {
  project = manifest.project;
  tree.innerHTML = "";
  for (const f of manifest.files) {
    const li = document.createElement("li");
    li.tabIndex = 0;
    li.innerHTML = `<span>${f.path}</span><span class="chip">✓</span>`;
    const open = () => openFile(f.path, li);
    li.onclick = open;
    li.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); } };
    tree.appendChild(li);
  }
  const v = $("verdict");
  v.className = "verdict " + (manifest.verification_passed ? "ok" : "fail");
  v.textContent = manifest.verification_passed ? "검증 통과" : "검증 실패";
  $("safety").hidden = false;
  $("safety").textContent = "⚠️ " + manifest.safety_notice;
  $("zip").disabled = false;
}

async function openFile(path, li) {
  document.querySelectorAll("#tree li").forEach(x => x.classList.remove("active"));
  if (li) li.classList.add("active");
  try {
    const r = await fetch(`/api/generated/${project}/${path}`);
    const text = await r.text();
    if (path === "ladder.json") {
      lastLadder = JSON.parse(text);
      ladderEl.innerHTML = window.LadderRender.svg(lastLadder);
      setTab("ladder");
    } else {
      view.textContent = text;
      setTab("view");
    }
  } catch (e) { showError("파일 열기 실패: " + e.message); }
}

function selectedVendors() {
  return [...$("vendors").selectedOptions].map(o => o.value);
}

$("zip").onclick = () => { if (project) window.location = `/api/generated/${project}.zip`; };

async function generate() {
  clearError();
  timeline.innerHTML = ""; tree.innerHTML = ""; $("zip").disabled = true;
  ladderEl.innerHTML = '<div class="empty" style="color:var(--muted)">생성 중…</div>';
  $("verdict").textContent = ""; $("safety").hidden = true; $("go").disabled = true;
  const mode = document.querySelector('input[name=mode]:checked').value;
  const text = $("input").value;
  const body = mode === "st"
    ? { st_code: text, vendors: selectedVendors() }
    : { request: text, vendors: selectedVendors() };
  try {
    const res = await fetch("/api/generate/files", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!res.ok || !res.body) { showError(`서버 오류 (${res.status})`); return; }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf("\n\n")) >= 0) {
        const frame = buf.slice(0, idx); buf = buf.slice(idx + 2);
        const evLine = frame.match(/^event: (.+)$/m);
        const dataLines = frame.split("\n").filter(l => l.startsWith("data: ")).map(l => l.slice(6));
        if (!dataLines.length) continue;
        let payload;
        try { payload = JSON.parse(dataLines.join("\n")); } catch { continue; }
        const ev = evLine ? evLine[1] : "progress";
        if (ev === "progress") logEvent(payload);
        else if (ev === "manifest") {
          renderTree(payload);
          openFile("ladder.json");
          fetch(`/api/generated/${payload.project}/EXPLAIN.md`)
            .then(r => r.ok ? r.text() : "").then(t => { if (t) $("explain").textContent = t; });
        }
        else if (ev === "error") { logEvent({ stage:"error", status:"error", message: payload.error }); showError(payload.error); }
      }
    }
  } catch (e) {
    showError("연결 오류: " + e.message);
  } finally {
    $("go").disabled = false;
  }
}

$("go").onclick = generate;
$("input").addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") generate();
});
</script>
</body>
</html>
