<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Twin3D PoC — WebGL 트윈 프리팹 (P-C 1단계)</title>
<style>
body{margin:0;background:#070b11;color:#e8f0f9;font-family:system-ui,sans-serif;overflow:hidden}
#hud{position:fixed;left:12px;top:10px;font-size:13px;color:#8b98a8;z-index:2;line-height:1.6}
#hud b{color:#7ee787}
</style></head><body>
<div id="hud"><b>Twin3D PoC</b> — 컨베이어 프리팹 WebGL 이식(P-C 1단계)<br/>
드래그=궤도 회전 · 휠=줌 · 자유 시점(z-buffer — 관통 원천 불가)</div>
<script src="vendor/three.min.js"></script>
<script>
"use strict";
/* 트윈 프리팹 1호(beltUnit) WebGL 포팅 — 캔버스판과 동일 치수(1u=1m) */
const T=window.THREE;
const renderer=new T.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);
const scene=new T.Scene();
scene.background=new T.Color(0x0a0f16);
scene.fog=new T.Fog(0x0a0f16,18,46);
const camera=new T.PerspectiveCamera(50,innerWidth/innerHeight,0.1,100);
/* 조명 */
scene.add(new T.AmbientLight(0x8899bb,0.5));
const sun=new T.DirectionalLight(0xffeedd,1.0);
sun.position.set(8,12,6);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-12;sun.shadow.camera.right=12;
sun.shadow.camera.top=12;sun.shadow.camera.bottom=-12;
scene.add(sun);
/* 바닥 */
const floor=new T.Mesh(new T.PlaneGeometry(30,20),
  new T.MeshStandardMaterial({color:0x222831,roughness:0.95}));
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);
const grid=new T.GridHelper(30,30,0x33404e,0x1c242e);
grid.position.y=0.002;scene.add(grid);
/* 프리팹: beltUnit(작업높이 0.75m·벨트폭 0.62m·길이 10m) — 트윈 치수 1:1 */
function beltUnit(len){
  const g=new T.Group();
  const steel=new T.MeshStandardMaterial({color:0x274b73,roughness:0.6,metalness:0.4});
  const dark=new T.MeshStandardMaterial({color:0x39434f,roughness:0.8});
  for(let x=-len/2+0.3;x<len/2;x+=1.9)for(const z of[-0.26,0.26]){
    const leg=new T.Mesh(new T.BoxGeometry(0.09,0.62,0.09),dark);
    leg.position.set(x,0.31,z);leg.castShadow=true;g.add(leg);
  }
  for(const z of[-0.275,0.275]){
    const rail=new T.Mesh(new T.BoxGeometry(len,0.13,0.07),steel);
    rail.position.set(0,0.685,z);rail.castShadow=true;g.add(rail);
  }
  const beltTex=(()=>{const c=document.createElement("canvas");c.width=256;c.height=32;
    const x=c.getContext("2d");x.fillStyle="#11151b";x.fillRect(0,0,256,32);
    x.strokeStyle="rgba(200,215,230,.14)";x.lineWidth=2;
    for(let i=0;i<256;i+=18){x.beginPath();x.moveTo(i,0);x.lineTo(i,32);x.stroke();}
    const t2=new T.CanvasTexture(c);t2.wrapS=T.RepeatWrapping;t2.repeat.set(len/1.2,1);return t2;})();
  const belt=new T.Mesh(new T.BoxGeometry(len,0.02,0.48),
    new T.MeshStandardMaterial({map:beltTex,roughness:0.9}));
  belt.position.y=0.745;g.add(belt);
  for(const e of[-len/2,len/2]){
    const drum=new T.Mesh(new T.CylinderGeometry(0.09,0.09,0.5,16),dark);
    drum.rotation.x=Math.PI/2;drum.position.set(e,0.7,0);g.add(drum);
  }
  return {group:g,beltTex};
}
const cv=beltUnit(10);cv.group.position.set(0,0,0);scene.add(cv.group);
/* 모터 + 부품 박스 */
const motor=new T.Mesh(new T.BoxGeometry(0.4,0.3,0.3),
  new T.MeshStandardMaterial({color:0x44528a,roughness:0.5,metalness:0.3}));
motor.position.set(5.3,0.62,0.45);motor.castShadow=true;scene.add(motor);
const boxes=[];
const cols=[0x3b82f6,0x7c5cff,0xd29922,0x3fa86b];
for(let i=0;i<4;i++){
  const b=new T.Mesh(new T.BoxGeometry(0.32,0.3,0.34),
    new T.MeshStandardMaterial({color:cols[i],roughness:0.7}));
  b.castShadow=true;b.userData.x=-4.5+i*2.4;scene.add(b);boxes.push(b);
}
/* 안전 펜스 조각(해저드) */
const hz=(()=>{const c=document.createElement("canvas");c.width=64;c.height=16;
  const x=c.getContext("2d");x.fillStyle="#caa011";x.fillRect(0,0,64,16);
  x.fillStyle="#1a1a1a";for(let i=-16;i<64;i+=16)x.fillRect(i,0,8,16);
  const t2=new T.CanvasTexture(c);t2.wrapS=T.RepeatWrapping;t2.repeat.set(6,1);return t2;})();
const fence=new T.Mesh(new T.BoxGeometry(10,0.08,0.03),
  new T.MeshBasicMaterial({map:hz}));
fence.position.set(0,1.05,-1.6);scene.add(fence);
for(let x=-5;x<=5;x+=2){
  const p=new T.Mesh(new T.BoxGeometry(0.06,1.1,0.06),
    new T.MeshStandardMaterial({color:0xcaa011}));
  p.position.set(x,0.55,-1.6);p.castShadow=true;scene.add(p);
}
/* 커스텀 궤도 카메라 */
let th=0.9,ph2=0.42,dist=11,tgt=new T.Vector3(0,0.6,0);
function camUpd(){
  camera.position.set(tgt.x+dist*Math.cos(ph2)*Math.cos(th),
    tgt.y+dist*Math.sin(ph2),tgt.z+dist*Math.cos(ph2)*Math.sin(th));
  camera.lookAt(tgt);
}
let drag=null;
addEventListener("pointerdown",e=>drag={x:e.clientX,y:e.clientY});
addEventListener("pointermove",e=>{if(!drag)return;
  th+=(e.clientX-drag.x)*0.005;
  ph2=Math.min(1.4,Math.max(0.08,ph2+(e.clientY-drag.y)*0.004));
  drag={x:e.clientX,y:e.clientY};});
addEventListener("pointerup",()=>drag=null);
addEventListener("wheel",e=>{dist=Math.min(30,Math.max(3,dist*Math.exp(e.deltaY*0.001)));},{passive:true});
addEventListener("resize",()=>{camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
/* 루프 — 벨트·박스·자동 선회 */
let last=performance.now();
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-last)/1000,0.05);last=now;
  if(!drag)th+=dt*0.12;
  cv.beltTex.offset.x-=dt*0.16;
  for(const b of boxes){
    b.userData.x+=dt*0.95;
    if(b.userData.x>4.7)b.userData.x=-4.8;
    b.position.set(b.userData.x,0.91,0);
  }
  camUpd();renderer.render(scene,camera);
  window.__ok=true;
}
camUpd();loop(performance.now());
</script></body></html>
