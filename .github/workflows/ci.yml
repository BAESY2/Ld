name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,web]"

      - name: Ruff (lint)
        run: ruff check app tests scripts training

      - name: Mypy (types)
        run: mypy app

      - name: Pytest
        env:
          USE_RAG: "false"
        run: pytest -q

      - name: Golden-set eval gate (이중코일 0 · 인터락 0)
        run: python scripts/eval.py
